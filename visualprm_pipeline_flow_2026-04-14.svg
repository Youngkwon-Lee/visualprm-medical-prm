<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="860" viewBox="0 0 1400 860">
  <defs>
    <style>
      .t{font-family:Inter,Segoe UI,Arial,sans-serif;fill:#0f172a}
      .h{font-size:30px;font-weight:700}
      .s{font-size:18px;fill:#475569}
      .b{font-size:16px;font-weight:600}
      .n{font-size:15px}
      .box{fill:#ffffff;stroke:#cbd5e1;stroke-width:2;rx:14}
      .lane{fill:#f8fafc;stroke:#e2e8f0;stroke-width:2;rx:16}
      .a{stroke:#64748b;stroke-width:2.5;marker-end:url(#m)}
    </style>
    <marker id="m" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#64748b"/>
    </marker>
  </defs>

  <text x="60" y="60" class="t h">VisualPRM Evaluation Flow (2026-04-14)</text>
  <text x="60" y="90" class="t s">Baseline(임시 Gemini) → RAG → RAG+PRM(구조 유지, 추후 Qwen-VL+real PRM 전환)</text>

  <rect x="50" y="120" width="1300" height="200" class="lane"/>
  <text x="70" y="155" class="t b">1) Baseline (현재: Gemini 임시)</text>
  <rect x="80" y="180" width="220" height="95" class="box"/>
  <text x="95" y="215" class="t n">Input</text><text x="95" y="238" class="t n">question + options</text>
  <rect x="350" y="180" width="260" height="95" class="box"/>
  <text x="365" y="215" class="t n">질문/선택지(+이미지)</text><text x="365" y="238" class="t n">Gemini 단독 추론</text>
  <rect x="670" y="180" width="240" height="95" class="box"/>
  <text x="685" y="215" class="t n">Final Answer</text><text x="685" y="238" class="t n">(baseline_pred)</text>
  <rect x="970" y="180" width="340" height="95" class="box"/>
  <text x="985" y="215" class="t n">Result</text><text x="985" y="238" class="t n">acc ≈ 0.50, pred 0-bias</text>
  <line x1="300" y1="228" x2="350" y2="228" class="a"/>
  <line x1="610" y1="228" x2="670" y2="228" class="a"/>
  <line x1="910" y1="228" x2="970" y2="228" class="a"/>

  <rect x="50" y="350" width="1300" height="220" class="lane"/>
  <text x="70" y="385" class="t b">2) RAG Pipeline</text>
  <rect x="80" y="415" width="190" height="105" class="box"/>
  <text x="95" y="450" class="t n">Input</text>
  <rect x="320" y="415" width="210" height="105" class="box"/>
  <text x="335" y="450" class="t n">Route policy</text>
  <rect x="580" y="415" width="230" height="105" class="box"/>
  <text x="595" y="450" class="t n">Retrieve (Qdrant)</text>
  <text x="595" y="473" class="t n">+ gating</text>
  <rect x="860" y="415" width="220" height="105" class="box"/>
  <text x="875" y="450" class="t n">Gemini grounded</text>
  <text x="875" y="473" class="t n">reasoning</text>
  <rect x="1130" y="415" width="180" height="105" class="box"/>
  <text x="1145" y="450" class="t n">Final answer</text>
  <line x1="270" y1="468" x2="320" y2="468" class="a"/>
  <line x1="530" y1="468" x2="580" y2="468" class="a"/>
  <line x1="810" y1="468" x2="860" y2="468" class="a"/>
  <line x1="1080" y1="468" x2="1130" y2="468" class="a"/>

  <rect x="50" y="600" width="1300" height="210" class="lane"/>
  <text x="70" y="635" class="t b">3) RAG + PRM (앞단 RAG 동일, 마지막 선택만 PRM)</text>
  <rect x="80" y="660" width="220" height="100" class="box"/>
  <text x="95" y="695" class="t n">RAG context</text>
  <text x="95" y="718" class="t n">+ question/options</text>
  <rect x="350" y="660" width="240" height="100" class="box"/>
  <text x="365" y="695" class="t n">BoN candidates</text>
  <text x="365" y="718" class="t n">(bon_n)</text>
  <rect x="640" y="660" width="250" height="100" class="box"/>
  <text x="655" y="695" class="t n">PRM scoring</text>
  <text x="655" y="718" class="t n">(현재 surrogate, 추후 real PRM)</text>
  <rect x="940" y="660" width="220" height="100" class="box"/>
  <text x="955" y="695" class="t n">Select best</text>
  <text x="955" y="718" class="t n">(prm_select)</text>
  <rect x="1210" y="660" width="120" height="100" class="box"/>
  <text x="1225" y="695" class="t n">Output</text>
  <line x1="300" y1="710" x2="350" y2="710" class="a"/>
  <line x1="590" y1="710" x2="640" y2="710" class="a"/>
  <line x1="890" y1="710" x2="940" y2="710" class="a"/>
  <line x1="1160" y1="710" x2="1210" y2="710" class="a"/>

  <text x="890" y="804" class="t s">현재 진단: 후보 다양성 붕괴(all candidates=0) / 전환 계획: Qwen-VL + real PRM</text>
</svg>
