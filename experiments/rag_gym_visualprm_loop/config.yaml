experiment:
  name: rag_gym_visualprm_loop_v2
  seed: 42

backend:
  base_url: http://127.0.0.1:8764
  timeout_sec: 90

data:
  input_path: /mnt/d/visualprm/pathvqa_test_for_app.json
  max_samples: 3
  image_url_prefix: "http://100.125.26.99:8766/visualprm"  # 이미지 절대 URL prefix

loop:
  max_iter: 1
  num_actions: 3
  temperature: 0.8
  top_p: 1.0
  stop_if_answer: true
  early_stop_same_answer_rounds: 2

critic:
  mode: verify_steps   # verify_steps | random
  base_url: ""  # 단일 백엔드(8764) 사용

output:
  dir: /mnt/d/visualprm/experiments/rag_gym_visualprm_loop/outputs
  save_candidates: true
